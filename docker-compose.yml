services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vitals
      POSTGRES_PASSWORD: vitals
      POSTGRES_DB: vitals
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitals"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
