name: CI/CD

on:
  push:
    branches: [master, 'feature/**']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'What to deploy'
        required: true
        default: 'both'
        type: choice
        options: [backend, frontend, both]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build -w @vitals/shared

      - name: Build backend
        run: npm run build -w @vitals/backend

      - name: Build frontend
        run: npm run build -w @vitals/frontend

      - name: Test backend
        run: npm test -w @vitals/backend

      - name: Test frontend
        run: npm test -w @vitals/frontend

  deploy-backend:
    name: Deploy Backend (Railway)
    needs: ci
    if: >
      (github.ref == 'refs/heads/master' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (inputs.deploy_target == 'backend' || inputs.deploy_target == 'both'))
    runs-on: ubuntu-latest
    environment: glistening-serenity / production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        run: curl -fsSX POST "${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}"

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: ci
    if: >
      (github.ref == 'refs/heads/master' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (inputs.deploy_target == 'frontend' || inputs.deploy_target == 'both'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build -w @vitals/shared

      - name: Build frontend
        run: npm run build -w @vitals/frontend

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: packages/frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: packages/frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: packages/frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
